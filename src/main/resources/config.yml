# Proxy settings
proxy:
  # The server name registered in Velocity/BungeeCord that /hub sends players to.
  hub-server: "lobby"

# Scheduled reboot settings
reboot:
  # Auto-reboot interval in minutes. Set to 0 to disable.
  interval: 720
  # How long before the reboot to broadcast warnings.
  alert-times:
    - 10m
    - 5m
    - 1m
    - 30s
    - 10s
    - 5s
    - 4s
    - 3s
    - 2s
    - 1s

time-lock:
  # Factions worlds are permanently day.
  faction-worlds:
    - "faction_spawn"
    - "faction_nether"
    - "faction_end"
  faction-time: 1000
